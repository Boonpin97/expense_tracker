name: Build & Deploy Finance Bot

on:
  push:
    branches: [main, dev]
    paths:
      - 'finance-bot/**'
      - '.github/workflows/deploy.yml'

env:
  GCP_REGION: asia-southeast1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment variables (dev)
        if: github.ref == 'refs/heads/dev'
        run: |
          echo "SERVICE_NAME=finance-bot-dev" >> $GITHUB_ENV
          echo "FIRESTORE_DATABASE=developer" >> $GITHUB_ENV
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.DEV_TELEGRAM_BOT_TOKEN }}" >> $GITHUB_ENV
          echo "TELEGRAM_WEBHOOK_SECRET=${{ secrets.DEV_TELEGRAM_WEBHOOK_SECRET }}" >> $GITHUB_ENV
          echo "SCHEDULER_SECRET=${{ secrets.DEV_SCHEDULER_SECRET }}" >> $GITHUB_ENV

      - name: Set environment variables (prod)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "SERVICE_NAME=finance-bot" >> $GITHUB_ENV
          echo "FIRESTORE_DATABASE=(default)" >> $GITHUB_ENV
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.PROD_TELEGRAM_BOT_TOKEN }}" >> $GITHUB_ENV
          echo "TELEGRAM_WEBHOOK_SECRET=${{ secrets.PROD_TELEGRAM_WEBHOOK_SECRET }}" >> $GITHUB_ENV
          echo "SCHEDULER_SECRET=${{ secrets.PROD_SCHEDULER_SECRET }}" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        id: deploy
        with:
          service: ${{ env.SERVICE_NAME }}
          source: ./finance-bot
          region: ${{ env.GCP_REGION }}
          env_vars: |
            TELEGRAM_BOT_TOKEN=${{ env.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_WEBHOOK_SECRET=${{ env.TELEGRAM_WEBHOOK_SECRET }}
            FIRESTORE_PROJECT_ID=${{ env.GCP_PROJECT_ID }}
            FIRESTORE_DATABASE=${{ env.FIRESTORE_DATABASE }}
            SCHEDULER_SECRET=${{ env.SCHEDULER_SECRET }}

      - name: Update CLOUD_RUN_URL
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --update-env-vars "CLOUD_RUN_URL=${{ steps.deploy.outputs.url }}"

      - name: Print service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
